name: CI/CD

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Validate backend imports
        run: python -m compileall backend/app

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Build backend image
        run: docker build -t sentinel-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t sentinel-frontend:ci ./frontend

  deploy-render:
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render backend deploy
        env:
          RENDER_DEPLOY_HOOK_BACKEND: ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_BACKEND" ]; then
            echo "RENDER_DEPLOY_HOOK_BACKEND not set — skipping backend deploy"
            exit 0
          fi
          curl -fsSL -X POST "$RENDER_DEPLOY_HOOK_BACKEND"

      - name: Trigger Render frontend deploy
        env:
          RENDER_DEPLOY_HOOK_FRONTEND: ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_FRONTEND" ]; then
            echo "RENDER_DEPLOY_HOOK_FRONTEND not set — skipping frontend deploy"
            exit 0
          fi
          curl -fsSL -X POST "$RENDER_DEPLOY_HOOK_FRONTEND"
